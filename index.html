<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>3te – Operator‑Axiom</title>

  <style>
    body {
      background: black;
      margin: 0;
      overflow: hidden;
    }
    #canvas3te {
      position: absolute;
      top: 0;
      left: 0;
    }
    #punkt {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 40px;
      height: 40px;
      background: white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 1.1s infinite ease-in-out;
    }
    @keyframes pulse {
      0%   { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
      50%  { transform: translate(-50%, -50%) scale(1.4); opacity: 0.5; }
      100% { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
    }
  </style>

  <!-- ⭐ beide neuen Dateien laden -->
  <script src="3te.html"></script>
  <script src="3teR.html"></script>
</head>

<body>

<canvas id="canvas3te" width="500" height="500"></canvas>
<div id="punkt"></div>

<script>
/* ---------------------------------------------------------
   3TE – VISUALISIERUNG (aus 3te.html)
--------------------------------------------------------- */

function draw3TE(x){
    // Operator-Ring
    x.strokeStyle = "#0f0";
    x.beginPath();
    x.arc(250,250,120,0,Math.PI*2);
    x.stroke();

    // Reset-Ring
    x.strokeStyle = "#4cf";
    x.beginPath();
    x.arc(250,250,70,0,Math.PI*2);
    x.stroke();

    // Signal-Ring
    x.strokeStyle = "#0f0";
    x.beginPath();
    x.arc(250,250,140,0,Math.PI*2);
    x.stroke();

    // Meta-Ring
    x.strokeStyle = "#f90";
    x.beginPath();
    x.arc(250,250,210,0,Math.PI*2);
    x.stroke();

    // TMP-Zentrum
    x.fillStyle = "#fff";
    x.beginPath();
    x.arc(250,250,10,0,Math.PI*2);
    x.fill();
}

/* ---------------------------------------------------------
   3TE – AXIOM ENGINE (aus 3teR.html)
--------------------------------------------------------- */

const AXIOM_3TE = {

  operator: ["IN","DA","NE","BEN"],
  reset: ["IX","XI","UP","IN","SET"],
  signal: ["X","Z","Q","U","S","D"],
  meta: ["M","B","H","Z","ORT","HOME","ROOM"],
  tmp: "D2",

  nc: {
    "9to3": true,
    "3to9": true,
    "ULTRA": true
  },

  find27(axis){
    if(this.operator.includes(axis)) return "O‑Ebene";
    if(this.reset.includes(axis)) return "R‑Ebene";
    if(this.signal.includes(axis)) return "S‑Ebene";
    if(this.meta.includes(axis)) return "M‑Ebene";
    if(axis === this.tmp) return "TMP‑Zentrum";
    return "Unbekannt";
  },

  prefetch(){
    return {
      operator: this.operator,
      reset: this.reset,
      signal: this.signal,
      meta: this.meta,
      tmp: this.tmp
    };
  },

  impulse(){
    return {
      operator: this.operator,
      reset: this.reset,
      signal: this.signal,
      meta: this.meta,
      tmp: this.tmp,
      nc: this.nc
    };
  }
};

/* ---------------------------------------------------------
   CANVAS ENGINE
--------------------------------------------------------- */

const c = document.getElementById("canvas3te");
const x = c.getContext("2d");

function loop(){
    x.clearRect(0,0,500,500);
    draw3TE(x);
    requestAnimationFrame(loop);
}
loop();

/* ---------------------------------------------------------
   PUNKT – ENGINE‑VERBINDUNG
--------------------------------------------------------- */

const punkt = document.getElementById("punkt");

punkt.addEventListener("click", () => {
  console.log("3TE‑IMPULS:", AXIOM_3TE.impulse());
  console.log("3TE‑PREFETCH:", AXIOM_3TE.prefetch());
});
</script>

</body>
</html>
